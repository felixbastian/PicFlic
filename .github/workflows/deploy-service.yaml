name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: picflic-490614
  REGION: europe-west1
  REPOSITORY: picflic-service
  SERVICE: picflic-cloud-run
  IMAGE: picflic-image
  PROJECT_NUMBER: 642164961505
  CLOUD_SQL_INSTANCE: picflic-database
  INSTANCE_CONNECTION_NAME: picflic-490614:europe-west1:picflic-database

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --service-account=cloud-run-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --allow-unauthenticated
            --set-env-vars OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},VOCAB_TELEGRAM_BOT_TOKEN=${{ secrets.VOCAB_TELEGRAM_BOT_TOKEN }},VOCAB_TELEGRAM_BOT_USERNAME=VocabTrainBot,VOCAB_CONVERSATION_TELEGRAM_BOT_TOKEN=${{ secrets.VOCAB_CONVERSATION_TELEGRAM_BOT_TOKEN }},VOCAB_CONVERSATION_TELEGRAM_BOT_USERNAME=VocabConversationBot,DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},DB_NAME=${{ secrets.DB_NAME }},INSTANCE_CONNECTION_NAME=${{ env.INSTANCE_CONNECTION_NAME }},PICTOAGENT_REVIEW_JOB_SECRET=${{ secrets.PICTOAGENT_REVIEW_JOB_SECRET }}
            --timeout=300
            --add-cloudsql-instances=${{ env.INSTANCE_CONNECTION_NAME }}
